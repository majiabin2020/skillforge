<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="1184" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4EF"/>
      <stop offset="1" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="1014" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5C1A"/>
      <stop offset="1" stop-color="#FF8A44"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1120" cy="112" r="168" fill="#FFE0D0"/>
  <circle cx="1040" cy="548" r="188" fill="#F0F0F0"/>
  <circle cx="176" cy="544" r="132" fill="#FFF0E8"/>

  <g filter="url(#shadow)">
    <rect x="88" y="84" width="1104" height="472" rx="28" fill="#FFFFFF"/>
  </g>

  <rect x="128" y="128" width="194" height="56" rx="18" fill="#0A0A0A"/>
  <text x="160" y="164" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">EasySkills</text>

  <text x="128" y="244" fill="#0A0A0A" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">Turn docs into installable Skills</text>
  <text x="128" y="296" fill="#4A4A4A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">Upload files, fetch web pages, or paste text. Generate SKILL.md packages for AI agents.</text>

