    <rect x="876" y="186" width="174" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.92"/>
    <rect x="876" y="222" width="212" height="12" rx="6" fill="#A3A3A3"/>
    <rect x="876" y="252" width="188" height="12" rx="6" fill="#A3A3A3"/>
    <rect x="876" y="300" width="222" height="84" rx="18" fill="url(#accent)"/>
    <text x="908" y="349" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">SKILL.md</text>
  </g>

  <g>
    <rect x="820" y="438" width="340" height="72" rx="22" fill="#FFF4EF" stroke="#FFD4BF"/>
    <text x="854" y="483" fill="#B45309" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">OpenCode / Cursor / Codex / OpenClaw</text>
