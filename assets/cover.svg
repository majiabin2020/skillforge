    <rect x="296" y="356" width="148" height="40" rx="20" fill="#FFF4EF" stroke="#FFD4BF"/>
    <text x="330" y="382" fill="#E04D12" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">PDF + OCR</text>

    <rect x="460" y="356" width="170" height="40" rx="20" fill="#FFF4EF" stroke="#FFD4BF"/>
    <text x="494" y="382" fill="#E04D12" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">No Build Tools</text>

    <rect x="646" y="356" width="196" height="40" rx="20" fill="#FFF4EF" stroke="#FFD4BF"/>
    <text x="679" y="382" fill="#E04D12" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Agent Skill Package</text>
